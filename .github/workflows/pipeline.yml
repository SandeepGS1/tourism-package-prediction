name: Tourism-Package-Prediction

on:
  push:
    branches:
      - main

jobs:
  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r tourism_project/requirements.txt

      - name: Upload dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python tourism_project/model_building/data_register.py

  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r tourism_project/requirements.txt

      - name: Run data prep
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python tourism_project/model_building/prep.py

  model-training:
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r tourism_project/requirements.txt

      - name: Train model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FAST_CI: "true"
          MLFLOW_TRACKING_URI: file://${{ github.workspace }}/mlruns
          MLFLOW_EXPERIMENT_NAME: tourism-package-prediction-experiment-ci
        run: python tourism_project/model_building/train.py

  deploy-space:
    needs: model-training
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Hugging Face client
        run: pip install huggingface_hub

      - name: Prepare Space files
        run: |
          mkdir -p deploy_space
          cp tourism_project/deployment/app.py deploy_space/app.py
          cp tourism_project/deployment/requirements.txt deploy_space/requirements.txt

          printf '%s\n' \
            '---' \
            'title: Tourism Package Prediction' \
            'emoji: 🌍' \
            'colorFrom: blue' \
            'colorTo: green' \
            'sdk: docker' \
            'sdk_version: "0.0.1"' \
            'app_file: app.py' \
            'pinned: false' \
            '---' > deploy_space/README.md

          cp tourism_project/deployment/Dockerfile deploy_space/Dockerfile

      - name: Deploy Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
from huggingface_hub import HfApi, create_repo
from huggingface_hub.utils import RepositoryNotFoundError
import os

repo_id = 'SandeepGS/tourism_package-prediction'
api = HfApi(token=os.getenv('HF_TOKEN'))

try:
    api.repo_info(repo_id=repo_id, repo_type='space')
except RepositoryNotFoundError:
    create_repo(repo_id=repo_id, repo_type='space', space_sdk='docker')

api.upload_folder(
    folder_path='deploy_space',
    repo_id=repo_id,
    repo_type='space'
)

print('Deployment complete')
"
