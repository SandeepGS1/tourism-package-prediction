

name: Tourism-Package-Prediction MLOps Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:

  # ✅ 1. Upload dataset to Hugging Face
  register-dataset:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install -r tourism_project/requirements.txt

      - name: Upload Dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python tourism_project/model_building/data_register.py

  # ✅ 2. Data preparation
  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install -r tourism_project/requirements.txt

      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python tourism_project/model_building/prep.py

  # ✅ 3. Model training + upload
  model-training:
    needs: data-prep
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install -r tourism_project/requirements.txt

      # ✅ Fix MLflow issue (no ngrok/public_url)
      - name: Train Model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FAST_CI: "true"
        run: |
          export MLFLOW_TRACKING_URI=file:./mlruns
          python tourism_project/model_building/train.py

  # ✅ 4. Deploy to Hugging Face Space (Streamlit)
  deploy-space:
    needs: model-training
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install huggingface_hub

      - name: Prepare Streamlit Space Structure
        run: |
          # ✅ Move only required files to root deployment folder
          mkdir deploy_space
          cp tourism_project/deployment/app.py deploy_space/app.py
          cp tourism_project/deployment/requirements.txt deploy_space/requirements.txt

          # ✅ Create README (mandatory for Streamlit Space)
          cat <<EOF > deploy_space/README.md
---
title: Tourism Package Prediction
emoji: 🌍
colorFrom: blue
colorTo: green
sdk: streamlit
app_file: app.py
---
EOF


      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<EOF
from huggingface_hub import HfApi, create_repo
from huggingface_hub.utils import RepositoryNotFoundError
import os

repo_id = "SandeepGS/tourism-package-prediction"
api = HfApi(token=os.getenv("HF_TOKEN"))

try:
    api.repo_info(repo_id=repo_id, repo_type="space")
    print("Space exists")
except RepositoryNotFoundError:
    create_repo(repo_id=repo_id, repo_type="space", space_sdk="streamlit")
    print("Space created")

api.upload_folder(
    folder_path="deploy_space",
    repo_id=repo_id,
    repo_type="space",
)

print("Deployment successful")
