

name: Tourism-Package-Prediction MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  # ==========================================
  # 1. Upload dataset to Hugging Face
  # ==========================================
  register-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install -r tourism_project/requirements.txt

      - name: Upload Dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python tourism_project/model_building/data_register.py


  # ==========================================
  # 2. Data Preparation
  # ==========================================
  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install -r tourism_project/requirements.txt

      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python tourism_project/model_building/prep.py


  # ==========================================
  # 3. Model Training + MLflow
  # ==========================================
  model-training:
    needs: data-prep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install -r tourism_project/requirements.txt

      - name: Train Model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FAST_CI: "true"
          MLFLOW_TRACKING_URI: file://${{ github.workspace }}/mlruns
          MLFLOW_EXPERIMENT_NAME: tourism-package-prediction-experiment-ci
        run: python tourism_project/model_building/train.py


  # ==========================================
  # 4. Deploy Streamlit App to HF Space
  # ==========================================
  deploy-space:
    needs: model-training
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Hugging Face Client
        run: pip install huggingface_hub

      # Prepare Space structure
      - name: Prepare Space Files
        run: |
          mkdir deploy_space
          cp tourism_project/deployment/app.py deploy_space/app.py
          cp tourism_project/deployment/requirements.txt deploy_space/requirements.txt

          cat <<EOF > deploy_space/README.md
---
title: Tourism Package Prediction
emoji: 🌍
colorFrom: blue
colorTo: green
sdk: streamlit
app_file: app.py
---
EOF

      # Deploy to Hugging Face Space
      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<EOF
from huggingface_hub import HfApi, create_repo
from huggingface_hub.utils import RepositoryNotFoundError
import os

repo_id = "SandeepGS/tourism_package-prediction"
api = HfApi(token=os.getenv("HF_TOKEN"))

try:
    api.repo_info(repo_id=repo_id, repo_type="space")
    print("✅ Space already exists")
except RepositoryNotFoundError:
    create_repo(repo_id=repo_id, repo_type="space", space_sdk="streamlit")
    print("✅ Space created")

api.upload_folder(
    folder_path="deploy_space",
    repo_id=repo_id,
    repo_type="space",
)

print("✅ Deployment successful")
